<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pencari Kata Indonesia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=Literata:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0d0b;
    --surface: #181713;
    --card: #1f1d18;
    --border: #2e2b24;
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --text: #e8e2d6;
    --muted: #7a7266;
    --highlight: #3a3328;
    --tag-bg: #2a2620;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Literata', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(200,169,110,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(200,169,110,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Decorative grid lines */
  .grid-deco {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,169,110,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,169,110,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 56px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
    position: relative;
  }

  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-label::before {
    content: '';
    display: inline-block;
    width: 24px;
    height: 1px;
    background: var(--accent);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 7vw, 72px);
    font-weight: 900;
    line-height: 0.95;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  h1 span {
    color: var(--accent);
    font-style: italic;
  }

  .header-sub {
    margin-top: 16px;
    color: var(--muted);
    font-size: 14px;
    font-style: italic;
    letter-spacing: 0.01em;
  }

  .wordcount-badge {
    position: absolute;
    top: 56px;
    right: 0;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: var(--tag-bg);
    border: 1px solid var(--border);
    padding: 8px 14px;
    letter-spacing: 0.05em;
  }

  /* Search Area */
  .search-zone {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
  }

  input[type="text"] {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    width: 100%;
    letter-spacing: 0.08em;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    background: var(--highlight);
  }

  input[type="text"]::placeholder {
    color: var(--muted);
    font-weight: 300;
    font-size: 16px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .result-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .result-count strong {
    color: var(--accent);
    font-size: 18px;
    font-weight: 500;
  }

  .sort-options {
    display: flex;
    gap: 8px;
  }

  .sort-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 5px 10px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .sort-btn.active, .sort-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--tag-bg);
  }

  .wl-status {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 20px;
    padding: 6px 12px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    display: inline-block;
  }

  /* Results grid */
  #results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1px;
    background: var(--border);
    margin-bottom: 60px;
    min-height: 80px;
  }

  .word-card {
    background: var(--card);
    padding: 16px 20px;
    cursor: default;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .word-card:hover {
    background: var(--highlight);
  }

  .word-card::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.15s;
    transform-origin: bottom;
  }

  .word-card:hover::after {
    transform: scaleY(1);
  }

  .word-text {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.01em;
    line-height: 1.2;
  }

  .word-text .prefix-hi {
    color: var(--accent2);
  }

  .word-text .suffix-hi {
    color: var(--accent);
    font-style: italic;
  }

  .word-len {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.1em;
  }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    padding: 60px 24px;
    text-align: center;
    color: var(--muted);
  }

  .empty-state .big-char {
    font-family: 'Playfair Display', serif;
    font-size: 80px;
    color: var(--border);
    line-height: 1;
    margin-bottom: 16px;
  }

  .empty-state p {
    font-style: italic;
    font-size: 15px;
  }

  /* Initial state */
  .initial-state {
    grid-column: 1 / -1;
    padding: 80px 24px;
    text-align: center;
  }

  .initial-state .prompt {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-style: italic;
    color: var(--muted);
  }

  .initial-state .arrow {
    font-size: 32px;
    color: var(--border);
    margin-bottom: 12px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* Category pills strip */
  .cat-strip {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .cat-pill {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    background: none;
  }

  .cat-pill:hover, .cat-pill.active {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--tag-bg);
  }

  /* Responsive */
  @media (max-width: 600px) {
    .search-zone { grid-template-columns: 1fr; }
    .wordcount-badge { display: none; }
    h1 { font-size: 40px; }
    #results { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  }
</style>
</head>
<body>
<div class="grid-deco"></div>

<div class="container">
  <header>
    <div class="header-label">Referensi Bahasa Indonesia</div>
    <h1>Pencari<br><span>Kata</span></h1>
    <div class="header-sub">Cari berdasarkan awalan · filter berdasarkan akhiran</div>
    <div class="wordcount-badge" id="totalBadge">— kata</div>
  </header>

  <div class="search-zone">
    <div class="field-group">
      <label>Awalan Kata</label>
      <input type="text" id="prefixInput" placeholder="mis. men..." autocomplete="off" spellcheck="false">
    </div>
    <div class="field-group">
      <label>Filter Akhiran</label>
      <input type="text" id="suffixInput" placeholder="mis. ...kan" autocomplete="off" spellcheck="false">
    </div>
  </div>

  <div class="cat-strip" id="catStrip">
    <button class="cat-pill active" data-cat="all">Semua</button>
    <button class="cat-pill" data-cat="umum">Umum</button>
    <button class="cat-pill" data-cat="kimia">Kimia</button>
    <button class="cat-pill" data-cat="fisika">Fisika</button>
    <button class="cat-pill" data-cat="biologi">Biologi</button>
    <button class="cat-pill" data-cat="matematika">Matematika</button>
    <button class="cat-pill" data-cat="medis">Medis</button>
    <button class="cat-pill" data-cat="geografi">Geografi</button>
  </div>

  <div class="stats-bar">
    <div class="result-count" id="resultCount">Ketik awalan untuk memulai pencarian</div>
    <div class="sort-options">
      <button class="sort-btn active" id="sortAZ" onclick="setSort('az')">A–Z</button>
      <button class="sort-btn" id="sortLen" onclick="setSort('len')">Panjang</button>
    </div>
  </div>

  <div class="wl-status" id="wlStatus">⟳ Memuat wordlist.json...</div>

  <div id="results">
    <div class="initial-state">
      <div class="arrow">↑</div>
      <div class="prompt">Masukkan awalan kata di atas</div>
    </div>
  </div>
</div>

// ——— Load wordlist.json and merge ———
let ALL_WORDS = [];

function buildWordList(extra = []) {
  ALL_WORDS = [...new Set(
    [...WORDS, ...extra].map(w => w.toLowerCase().trim()).filter(w => w.length > 1)
  )].sort((a, b) => a.localeCompare(b, 'id'));
  document.getElementById('totalBadge').textContent = ALL_WORDS.length.toLocaleString('id') + ' kata';
  document.getElementById('wlStatus').textContent = extra.length > 0
    ? `✓ wordlist.json dimuat (+${extra.length.toLocaleString('id')} kata)`
    : '⚠ wordlist.json tidak ditemukan, pakai data bawaan';
}

async function loadExternalWordlist() {
  const statusEl = document.getElementById('wlStatus');
  statusEl.textContent = '⟳ Memuat wordlist.json...';
  try {
    const res = await fetch('wordlist.json');
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    const extra = Array.isArray(data.words) ? data.words : [];
    buildWordList(extra);
  } catch (e) {
    buildWordList([]);
  }
}

loadExternalWordlist();

let currentSort = 'az';
let currentCat = 'all';

document.querySelectorAll('.cat-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render();
  });
});

function setSort(s) {
  currentSort = s;
  document.getElementById('sortAZ').classList.toggle('active', s === 'az');
  document.getElementById('sortLen').classList.toggle('active', s === 'len');
  render();
}

let debounceTimer;
function onInput() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 120);
}

document.getElementById('prefixInput').addEventListener('input', onInput);
document.getElementById('suffixInput').addEventListener('input', onInput);

function highlight(word, prefix, suffix) {
  prefix = prefix.toLowerCase();
  suffix = suffix.toLowerCase();
  let html = word;
  if (prefix && suffix && prefix.length + suffix.length <= word.length) {
    const mid = word.slice(prefix.length, word.length - suffix.length);
    html = `<span class="prefix-hi">${word.slice(0, prefix.length)}</span>${mid}<span class="suffix-hi">${word.slice(word.length - suffix.length)}</span>`;
  } else if (prefix) {
    html = `<span class="prefix-hi">${word.slice(0, prefix.length)}</span>${word.slice(prefix.length)}`;
  } else if (suffix) {
    html = `${word.slice(0, word.length - suffix.length)}<span class="suffix-hi">${word.slice(word.length - suffix.length)}</span>`;
  }
  return html;
}

function render() {
  const prefix = document.getElementById('prefixInput').value.toLowerCase().trim();
  const suffix = document.getElementById('suffixInput').value.toLowerCase().trim();
  const resultsEl = document.getElementById('results');
  const countEl = document.getElementById('resultCount');

  if (!prefix && !suffix) {
    resultsEl.innerHTML = `<div class="initial-state"><div class="arrow">↑</div><div class="prompt">Masukkan awalan atau akhiran untuk memulai</div></div>`;
    countEl.textContent = 'Ketik awalan untuk memulai pencarian';
    return;
  }

  let pool = ALL_WORDS;

  // Category filter
  if (currentCat !== 'all' && CAT_WORDS[currentCat]) {
    pool = pool.filter(w => CAT_WORDS[currentCat].has(w));
  }

  let filtered = pool.filter(w => {
    const matchPrefix = !prefix || w.startsWith(prefix);
    const matchSuffix = !suffix || w.endsWith(suffix);
    return matchPrefix && matchSuffix;
  });

  if (currentSort === 'len') {
    filtered.sort((a, b) => a.length - b.length || a.localeCompare(b, 'id'));
  } else {
    filtered.sort((a, b) => a.localeCompare(b, 'id'));
  }

  const total = filtered.length;

  if (total === 0) {
    let msg = prefix ? `"${prefix}..."` : '';
    if (suffix) msg += (msg ? ' + ' : '') + `"...${suffix}"`;
    resultsEl.innerHTML = `<div class="empty-state"><div class="big-char">∅</div><p>Tidak ada kata ditemukan untuk ${msg}</p></div>`;
    countEl.innerHTML = `Tidak ada hasil`;
    return;
  }

  const display = filtered.slice(0, 500);
  let html = '';
  for (const w of display) {
    html += `<div class="word-card"><div class="word-text">${highlight(w, prefix, suffix)}</div><div class="word-len">${w.length} huruf</div></div>`;
  }

  resultsEl.innerHTML = html;

  const preLabel = prefix ? `"${prefix}..."` : '';
  const sufLabel = suffix ? `"...${suffix}"` : '';
  const filterStr = [preLabel, sufLabel].filter(Boolean).join(' · ');
  const moreStr = total > 500 ? ` <span style="color:var(--muted)">(menampilkan 500 dari ${total.toLocaleString('id')})</span>` : '';
  countEl.innerHTML = `<strong>${total.toLocaleString('id')}</strong> kata ditemukan · ${filterStr}${moreStr}`;
}
